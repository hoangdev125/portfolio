<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Glowing background circles -->
  <circle cx="400" cy="200" r="160" fill="#06b6d4" fill-opacity="0.08" filter="url(#glow)"/>
  <circle cx="100" cy="350" r="100" fill="#8b5cf6" fill-opacity="0.06" filter="url(#glow)"/>

  <!-- Main Portfolio Mock Frame -->
  <g transform="translate(60, 40)">
    <!-- Browser UI Frame -->
    <rect width="680" height="370" rx="16" fill="#0f172a" fill-opacity="0.6" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Top Browser Bar with dots -->
    <g transform="translate(0, 0)">
      <rect width="680" height="35" rx="16" fill="#020617" fill-opacity="0.6" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="18" r="4" fill="#ef4444"/>
      <circle cx="32" cy="18" r="4" fill="#eab308"/>
      <circle cx="44" cy="18" r="4" fill="#22c55e"/>
      <rect x="80" y="8" width="520" height="20" rx="6" fill="#0f172a" fill-opacity="0.9" stroke="#1e293b" stroke-width="1"/>
      <text x="340" y="21" text-anchor="middle" fill="#64748b" font-family="'Inter', sans-serif" font-size="9">hoang-dev-portfolio.vercel.app</text>
    </g>

    <!-- UI Mock Content -->
    <g transform="translate(0, 35)">
      
      <!-- Sticky Navigation -->
      <g transform="translate(0, 0)">
        <rect width="680" height="45" fill="#020617" fill-opacity="0.3" stroke="#1e293b" stroke-width="1"/>
        <text x="40" y="27" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="900" letter-spacing="1">HOÀNG.DEV</text>
        <rect x="450" y="16" width="30" height="12" rx="6" fill="#3b82f6" fill-opacity="0.2"/>
        <circle cx="474" cy="22" r="4" fill="#3b82f6"/>
        <rect x="500" y="16" width="40" height="12" rx="6" fill="#1e293b"/>
        <rect x="560" y="16" width="40" height="12" rx="6" fill="#1e293b"/>
        <rect x="620" y="14" width="20" height="16" rx="4" fill="url(#cyanGlow)" filter="url(#glow)"/>
      </g>

      <!-- Left Hero Column -->
      <g transform="translate(40, 75)">
        <rect x="0" y="0" width="100" height="15" rx="7.5" fill="none" stroke="#06b6d4" stroke-opacity="0.4" stroke-width="1"/>
        <text x="50" y="11" text-anchor="middle" fill="#06b6d4" font-family="'Inter', sans-serif" font-size="8" font-weight="bold">XIN CHÀO 👋</text>
        
        <text x="0" y="45" fill="#ffffff" font-family="'Inter', sans-serif" font-size="30" font-weight="900">Tôi là Hoàng</text>
        <text x="0" y="75" fill="url(#purpleGlow)" font-family="'Inter', sans-serif" font-size="20" font-weight="900" filter="url(#glow)">Fullstack Developer</text>
        
        <rect x="0" y="95" width="220" height="4" rx="2" fill="#64748b" fill-opacity="0.4"/>
        <rect x="0" y="105" width="180" height="4" rx="2" fill="#64748b" fill-opacity="0.4"/>

        <!-- Action Buttons -->
        <rect x="0" y="130" width="80" height="28" rx="8" fill="url(#cyanGlow)" filter="url(#glow)"/>
        <text x="40" y="147" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="10" font-weight="bold">Projects</text>
        
        <rect x="90" y="130" width="80" height="28" rx="8" fill="none" stroke="#1e293b" stroke-width="1"/>
        <text x="130" y="147" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="10" font-weight="bold">Download CV</text>
      </g>

      <!-- Right Column: Abstract Code Screen Mockup -->
      <g transform="translate(380, 75)">
        <rect width="260" height="200" rx="12" fill="#020617" fill-opacity="0.9" stroke="#1e293b" stroke-width="1" filter="url(#glow)"/>
        <rect width="260" height="25" rx="12" fill="#1e293b" fill-opacity="0.3" stroke="none"/>
        <circle cx="15" cy="12.5" r="3" fill="#64748b"/>
        <circle cx="25" cy="12.5" r="3" fill="#64748b"/>
        <circle cx="35" cy="12.5" r="3" fill="#64748b"/>
        
        <!-- Code syntax lines -->
        <text x="15" y="45" fill="#3b82f6" font-family="'Courier New', monospace" font-size="10" font-weight="bold">const</text>
        <text x="55" y="45" fill="#06b6d4" font-family="'Courier New', monospace" font-size="10" font-weight="bold">developer</text>
        <text x="120" y="45" fill="#ffffff" font-family="'Courier New', monospace" font-size="10">=</text>
        <text x="135" y="45" fill="#8b5cf6" font-family="'Courier New', monospace" font-size="10">{</text>
        
        <text x="30" y="65" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="9">name:</text>
        <text x="65" y="65" fill="#ec4899" font-family="'Courier New', monospace" font-size="9">"Hoàng",</text>
        
        <text x="30" y="85" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="9">role:</text>
        <text x="65" y="85" fill="#ec4899" font-family="'Courier New', monospace" font-size="9">"Fullstack Developer",</text>

        <text x="30" y="105" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="9">skills:</text>
        <text x="75" y="105" fill="#8b5cf6" font-family="'Courier New', monospace" font-size="9">[</text>
        <text x="45" y="125" fill="#ec4899" font-family="'Courier New', monospace" font-size="8">"React", "TS", "Spring Boot"</text>
        <text x="30" y="145" fill="#8b5cf6" font-family="'Courier New', monospace" font-size="9">],</text>
        
        <text x="30" y="165" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="9">passionate:</text>
        <text x="100" y="165" fill="#22c55e" font-family="'Courier New', monospace" font-size="9">true</text>

        <text x="15" y="185" fill="#8b5cf6" font-family="'Courier New', monospace" font-size="10">};</text>
      </g>

    </g>
  </g>
</svg>
